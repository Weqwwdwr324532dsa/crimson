<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exclusive Reward</title>

<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:Arial;}

body {
    color:white;
    text-align:center;
    overflow:hidden;
}

/* Background Video */
video {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* Overlay */
.overlay {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* Content */
.container {
    position:relative;
    top:50%;
    transform:translateY(-50%);
    padding:20px;
}

h1 {
    font-size:32px;
    margin-bottom:10px;
}

p {
    font-size:18px;
    margin-bottom:20px;
}

/* Countdown */
.timer {
    font-size:24px;
    margin:15px 0;
    color:#22c55e;
}

/* Scarcity */
.scarcity {
    color:#f87171;
    margin-bottom:20px;
    font-weight:bold;
}

/* Button Animation */
.btn {
    display:inline-block;
    padding:15px 35px;
    background:#22c55e;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0% {transform:scale(1);}
    50% {transform:scale(1.1);}
    100% {transform:scale(1);}
}

.btn:hover {
    background:#16a34a;
}

/* Mobile */
@media(max-width:600px){
    h1 {font-size:24px;}
    p {font-size:16px;}
}
</style>

</head>
<body>

<!-- Background Video -->
<video autoplay muted loop>
    <source src="YOUR_VIDEO_LINK.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">
    
    <h1>🎁 Claim Your Exclusive Reward</h1>
    <p>Limited time offer – don’t miss out</p>

    <div class="timer" id="countdown">02:00</div>

    <div class="scarcity">⚠️ Only 37 rewards left</div>

    <a href="YOUR_CPA_LINK" class="btn">Claim Now</a>

</div>

<script>
// Countdown Timer
let time = 120;
let countdown = document.getElementById("countdown");

setInterval(() => {
    let minutes = Math.floor(time / 60);
    let seconds = time % 60;
    countdown.innerHTML = 
        (minutes < 10 ? "0" : "") + minutes + ":" + 
        (seconds < 10 ? "0" : "") + seconds;

    if(time > 0) time--;
}, 1000);

// Random Scarcity
let left = Math.floor(Math.random() * 50) + 10;
document.querySelector(".scarcity").innerHTML = "⚠️ Only " + left + " rewards left";

</script>

</body>
</html>
