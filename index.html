/* Dark Overlay */
.overlay {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

/* Center Content */
.container {
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:90%;
}

/* Heading */
h1 {
    font-size:32px;
}

/* Timer */
.timer {
    font-size:26px;
    color:#22c55e;
    margin:15px 0;
}

/* Scarcity */
.scarcity {
    color:#f87171;
    margin-bottom:20px;
}

/* Button */
.btn {
    display:inline-block;
    background:#22c55e;
    padding:15px 30px;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-size:18px;
    animation:pulse 1.5s infinite;
}

@keyframes pulse {
    0% {transform:scale(1);}
    50% {transform:scale(1.1);}
    100% {transform:scale(1);}
}

/* Mobile */
@media(max-width:600px){
    h1 {font-size:24px;}
}
</style>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
    <h1>🎁 Claim Your Exclusive Reward</h1>
    <p>Limited time offer – act fast!</p>

    <div class="timer" id="timer">02:00</div>
    <div class="scarcity">⚠️ Only 23 rewards left</div>

    <a href="YOUR_CPA_LINK" class="btn">Claim Now</a>

    <p style="font-size:12px;opacity:0.6;margin-top:20px;">
    This is a promotional page. We are not officially associated with any game.
    </p>
</div>

<script>
let t=120;
setInterval(()=>{
let m=Math.floor(t/60),s=t%60;
document.getElementById("timer").innerHTML=`0${m}:${s<10?"0":""}${s}`;
if(t>0)t--;
},1000);

// Random scarcity
let left = Math.floor(Math.random()*30)+10;
document.querySelector(".scarcity").innerHTML = "⚠️ Only " + left + " rewards left";
</script>

</body>
